<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stock Pro 10X — Log ind</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0e17;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #111827;
    border: 1px solid #1e2d3d;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  }
  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }
  h1 {
    font-size: 22px;
    font-weight: 700;
    color: #f8fafc;
    text-align: center;
  }
  .subtitle {
    font-size: 13px;
    color: #64748b;
    text-align: center;
    margin-top: 4px;
  }
  .form { margin-top: 32px; }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: #94a3b8;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 6px;
    margin-top: 16px;
  }
  input {
    width: 100%;
    background: #0d1520;
    border: 1px solid #1e2d3d;
    border-radius: 8px;
    padding: 12px 14px;
    color: #f1f5f9;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus { border-color: #3b82f6; }
  .btn {
    width: 100%;
    margin-top: 28px;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { opacity: 0.8; }
  .error {
    background: #1f1015;
    border: 1px solid #7f1d1d;
    color: #fca5a5;
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    margin-top: 16px;
    display: none;
  }
  .error.show { display: block; }
  .lock {
    text-align: center;
    color: #374151;
    font-size: 12px;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-icon">📈</span>
    <h1>Stock Pro 10X</h1>
    <p class="subtitle">Privat adgang</p>
  </div>
  <form class="form" method="POST" action="/login" id="loginForm">
    <label for="username">Brugernavn</label>
    <input type="text" id="username" name="username" placeholder="Dit brugernavn" autocomplete="username" required>
    <label for="password">Adgangskode</label>
    <input type="password" id="password" name="password" placeholder="Din adgangskode" autocomplete="current-password" required>
    <button type="submit" class="btn">Log ind →</button>
    <div class="error" id="errorMsg">Forkert brugernavn eller adgangskode</div>
  </form>
  <p class="lock">🔒 Privat adgang — kun til ejeren</p>
</div>
<script>
  // Show error if redirected back with ?error=1
  if (window.location.search.includes('error=1')) {
    document.getElementById('errorMsg').classList.add('show');
  }
</script>
</body>
</html>
